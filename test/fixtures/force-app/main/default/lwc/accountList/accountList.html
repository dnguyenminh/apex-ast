<template>
    <lightning-card title="Accounts" icon-name="standard:account">
        <template lwc:if={isLoading}>
            <lightning-spinner alternative-text="Loading"></lightning-spinner>
        </template>
        <template lwc:elseif={error}>
            <p class="error-message">{error.body.message}</p>
        </template>
        <template lwc:else>
            <template for:each={accounts} for:item="account">
                <div key={account.Id} class="account-row" onclick={handleRowClick} data-id={account.Id}>
                    <c-account-card account={account}></c-account-card>
                </div>
            </template>
        </template>
        <div slot="footer">
            <lightning-button label="Refresh" onclick={handleRefresh}></lightning-button>
        </div>
    </lightning-card>
</template>
